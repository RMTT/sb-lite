name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - openwrt

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: sblite-amd64-linux
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: sblite-arm64-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build backend
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sblite dist/${{ matrix.artifact_name }}
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz
          retention-days: 1

  openwrt-apk:
    name: Build OpenWrt APK for ${{ matrix.arch }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64
            artifact: sblite-amd64-linux
          - arch: aarch64
            target: aarch64_cortex-a53
            artifact: sblite-arm64-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/sblite-artifact

      - name: Extract binary
        run: |
          tar -xzf /tmp/sblite-artifact/${{ matrix.artifact }}.tar.gz -C /tmp/sblite-artifact
          mv /tmp/sblite-artifact/${{ matrix.artifact }} sblite-bin
          chmod +x sblite-bin

      - name: Build OpenWrt Package
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.target }}
          FEED_DIR: ${{ github.workspace }}/openwrt
          PACKAGES: sblite
          EXTRA_CMD: ls -al; echo "CONFIG_PACKAGE_FORMAT_APK=y" >> .config
          NO_SHFMT_CHECK: true
          V: s

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sblite-openwrt-apk-${{ matrix.arch }}
          path: bin/packages/${{ matrix.target }}/action/sblite*.apk
          retention-days: 1

  release:
    name: Create Release
    needs: [build, openwrt-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.apk
          generate_release_notes: true
