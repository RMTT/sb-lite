name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: sblite-amd64-linux
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: sblite-arm64-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build backend
        run: cross build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sblite dist/${{ matrix.artifact_name }}
          cd dist
          tar -czf ${{ matrix.artifact_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz
          retention-days: 1

  openwrt-apk:
    name: Build OpenWrt APK for ${{ matrix.arch }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86/64
            artifact: sblite-amd64-linux
          - arch: aarch64
            target: mediatek/mt7986
            artifact: sblite-arm64-linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}

      - name: Extract binary
        run: |
          tar -xzf /tmp/${{ matrix.artifact }}/${{ matrix.artifact }}.tar.gz -C /tmp
          chmod +x /tmp/${{ matrix.artifact }}/${{ matrix.artifact }}

      - name: Setup OpenWrt SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

          # Use the generic downloads page for snapshot targets
          BASE_URL="https://downloads.openwrt.org/snapshots/targets/${{ matrix.target }}"
          wget -qO sha256sums "$BASE_URL/sha256sums"

          # Find the SDK filename dynamically based on the target string
          TARGET_SAFE=$(echo "${{ matrix.target }}" | tr '/' '-')
          SDK_FILE=$(grep -oE "openwrt-sdk-$TARGET_SAFE.*Linux-x86_64.tar.xz" sha256sums | head -n 1)

          if [ -z "$SDK_FILE" ]; then
            echo "Error: Could not find SDK filename in sha256sums"
            sh -c "exit 1"
          fi

          wget "$BASE_URL/$SDK_FILE" -O sdk.tar.xz
          mkdir sdk
          tar -xf sdk.tar.xz -C sdk --strip-components=1

      - name: Build Package
        run: |
          cd sdk

          # Enable APK format
          echo "CONFIG_PACKAGE_FORMAT_APK=y" >> .config

          # Create package directory
          mkdir -p package/sblite/files
          cp -r ../openwrt/* package/sblite/

          # Run prepare to create the build_dir structure
          make package/sblite/prepare V=s

          # Copy our pre-compiled binary directly into the build directory
          # The package Makefile defines PKG_NAME:=sblite, so the build dir is sblite-*
          PKG_BUILD_DIR=$(find build_dir/ -type d -name "sblite-*" | head -n 1)
          cp /tmp/${{ matrix.artifact }}/${{ matrix.artifact }} $PKG_BUILD_DIR/sblite

          # Compile/package
          make package/sblite/compile V=s

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sblite-openwrt-apk-${{ matrix.arch }}
          path: sdk/bin/packages/*/base/sblite*.apk
          retention-days: 1

  release:
    name: Create Release
    needs: [build, openwrt-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.apk
          generate_release_notes: true
